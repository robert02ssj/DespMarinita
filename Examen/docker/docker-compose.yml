version: '3'

services:
  web:
    image: ${DOCKERHUB_USERNAME}/floppybird:latest
    networks:
      - frontend-network
    restart: always

  https-portal:
    image: steveltn/https-portal:1
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAINS: "${DOMAIN} -> http://web:80"
      STAGE: 'production'
    networks:
      - frontend-network
    restart: always
    depends_on:
      - web

networks:
  frontend-network:
